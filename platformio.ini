[env:esp32-dashboard]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.partitions = default_16MB.csv

; NO PSRAM — Arduino_GFX doesn't need a large PSRAM framebuffer
board_build.psram = disable

build_flags =
    -Os
    -std=gnu++17
    -DLV_CONF_INCLUDE_SIMPLE
    -Iinclude
    -I$(PLATFORMIO_PACKAGES_DIR)/framework-arduinoespressif32/cores/esp32

lib_deps =
    lvgl/lvgl@^9.2.0
    https://github.com/moononournation/Arduino_GFX.git#v1.3.2
    bblanchon/ArduinoJson@^7.3.0
