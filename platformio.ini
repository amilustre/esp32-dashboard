; PlatformIO Project Configuration
; Board: Sunton ESP32-8048S070 (7" 800x480 RGB TFT + GT911 capacitive touch)
; MCU: ESP32-S3 with 16MB Flash + 8MB PSRAM
; Framework: Arduino
;
; Build instructions:
;   1. Install PlatformIO (pip install platformio or use VSCode extension)
;   2. Open this folder in PlatformIO
;   3. Build: pio run
;   4. Upload: pio run --target upload
;   5. Monitor: pio device monitor

[env:esp32-dashboard]
platform = espressif32@6.9.0
board = esp32s3box
framework = arduino
monitor_speed = 115200

; Board configuration overrides for Sunton ESP32-8048S070
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L

; Partition table for 16MB flash (needed for the Sunton board)
board_build.partitions = default_16MB.csv

; PSRAM configuration - required for 800x480 display buffer
; The esp32s3box board defines PSRAM by default, but we ensure it's enabled
build_flags =
    -Os
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -DCONFIG_ESP32S3_BOX_BOARD=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE

; Library dependencies
lib_deps =
    ; LVGL 9.x - Graphics library for the UI
    lvgl/lvgl@^9.2.0
    ; Arduino GFX - Display driver for RGB panels
    moononournation/GFX Library for Arduino@^1.5.0
    ; TAMC GT911 - Capacitive touch controller driver
    tamctec/TAMC_GT911@^1.0.2
    ; ArduinoJson - JSON parsing for API responses
    bblanchon/ArduinoJson@^7.3.0
